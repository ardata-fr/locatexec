on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release'}
          - {os: macOS-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Browsers are installed where locatexec looks for them: the
      # /Applications/*.app bundles on macOS and the system PATH / registry on
      # Linux and Windows (Chrome and Firefox are preinstalled on the Windows
      # and Ubuntu runners and registered so exec_locate() can find them).
      - name: Install browsers (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask google-chrome
          brew install --cask firefox

      - name: Install firefox (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Install libreoffice (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask libreoffice

      - name: Install libreoffice (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libreoffice

      - name: Install libreoffice (Windows)
        if: runner.os == 'Windows'
        run: choco install --no-progress libreoffice-fresh

      - name: Install air (macOS)
        if: runner.os == 'macOS'
        run: brew install air

      - name: Install air (Linux)
        if: runner.os == 'Linux'
        run: curl -LsSf https://github.com/posit-dev/air/releases/latest/download/air-installer.sh | sh

      - name: Install air (Windows)
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -c "irm https://github.com/posit-dev/air/releases/latest/download/air-installer.ps1 | iex"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
